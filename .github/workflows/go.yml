name: Go

on: [push, pull_request]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Test
      run: go test -v ./...

    - name: Test Cloud Function build (simulate GCP buildpack)
      run: bash scripts/test-cloudfn-build.sh
